<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurotia | Premium Software & Analytics</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Deep, premium black */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            /* The futuristic blue gradient */
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .cta-button {
            padding: 14px 28px;
            background-color: transparent;
            color: #00f2fe;
            border: 2px solid #00f2fe;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .cta-button:hover {
            background-color: #00f2fe;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rainbow</h1>
        <p>Illuminating Data. Engineering the Future.<br>Our premium software and analytics solutions are launching soon.</p>
        <a href="mailto:contact@aurotia.com" class="cta-button">Get in Touch</a>
    </div>
</body>
</html>
